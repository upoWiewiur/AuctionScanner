<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Market Analyzer</title>
<meta name="theme-color" content="#050d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050d1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;padding-bottom:70px}
:root{--a:#3a78ff;--g:rgba(255,255,255,0.04);--b:rgba(255,255,255,0.08)}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(5,13,26,0.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--b)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a3a8f,var(--a));border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px}
h1{font-size:16px;font-weight:700}
.sub{font-size:9px;color:var(--a);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.dot{width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
main{flex:1;padding:12px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--g);border:1px solid var(--b);border-radius:16px;padding:14px;backdrop-filter:blur(12px)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.st{background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:12px;padding:12px}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:4px}
.sv{font-size:19px;font-weight:800;letter-spacing:-.5px;color:#f8fafc}
.ss{font-size:10px;margin-top:2px}
.green{color:#22c55e}.red{color:#ef4444}.gray{color:#64748b}
input[type=text]{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:8px}
input:focus{border-color:var(--a)}
.il{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.ir{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:12px;cursor:pointer;transition:all .15s}
.ir:hover,.ir.active{background:rgba(58,120,255,0.12);border-color:rgba(58,120,255,.3)}
.in{font-size:13px;font-weight:600;color:#f8fafc}
.id{font-size:9px;color:#475569;margin-top:1px}
.ip{font-size:13px;font-weight:700;text-align:right}
.ic{font-size:9px;text-align:right;margin-top:1px}
.ch{position:relative;height:180px;width:100%}
canvas{width:100%!important}
.sr{padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:12px;margin-bottom:6px}
.sh{display:flex;justify-content:space-between;align-items:center}
.si{font-size:12px;font-weight:600}
.sd{font-size:11px;font-weight:700;color:#22c55e;background:rgba(34,197,94,.1);padding:2px 7px;border-radius:6px}
.sp{display:flex;gap:12px;margin-top:5px}
.spl{font-size:9px;color:#64748b;margin-bottom:1px}
.spv{font-size:12px;font-weight:600}
.tt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:8px}
.bn{position:fixed;bottom:0;left:0;right:0;background:rgba(5,13,26,0.98);backdrop-filter:blur(24px);border-top:1px solid var(--b);display:flex;justify-content:space-around;align-items:center;padding:10px 0;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#475569;cursor:pointer;padding:4px 20px;font-family:inherit;transition:color .2s}
.nb.active{color:var(--a)}
.nb svg{width:22px;height:22px}
.nb span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.nr{background:rgba(58,120,255,.15);border:1px solid rgba(58,120,255,.25);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 0 20px rgba(58,120,255,.2)}
.tc{display:none}.tc.active{display:flex;flex-direction:column;gap:12px}
.empty{text-align:center;color:#475569;font-size:12px;padding:20px}
.spin{animation:s 1s linear infinite}
@keyframes s{from{transform:rotate(0)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="logo-icon"><svg fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div>
    <div><h1>Market Analyzer</h1><span class="sub">DonutSMP</span></div>
    <div class="dot" style="margin-left:8px"></div>
  </div>
  <span id="upd" style="font-size:10px;color:#475569">---</span>
</nav>

<main>
  <div id="tab-market" class="tc active">
    <div class="sg">
      <div class="st"><div class="sl">Cena</div><div class="sv" id="sp">---</div><div class="ss gray" id="sps">wybierz</div></div>
      <div class="st"><div class="sl">Śred. 7d</div><div class="sv" id="sa">---</div><div class="ss gray" id="sas">brak danych</div></div>
      <div class="st"><div class="sl">Stos ×64</div><div class="sv" id="ss2">---</div><div class="ss gray" id="sr2">HOLD</div></div>
      <div class="st"><div class="sl">Okazje</div><div class="sv green" id="sd">0</div><div class="ss gray">poniżej śred.</div></div>
    </div>
    <div class="card"><div class="ch"><canvas id="chart"></canvas></div></div>
    <div class="card">
      <div class="tt">Przedmioty</div>
      <input type="text" placeholder="Szukaj..." id="q" oninput="renderItems()">
      <div class="il" id="il"></div>
    </div>
  </div>

  <div id="tab-snipes" class="tc">
    <div class="card">
      <div class="tt">Ostatnie okazje</div>
      <div id="sl2"><div class="empty">Ładowanie...</div></div>
    </div>
  </div>
</main>

<div class="bn">
  <button class="nb active" id="nm" onclick="setTab('market')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
    <span>Rynek</span>
  </button>
  <button class="nb nr" onclick="load(true)">
    <svg id="ri" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
  </button>
  <button class="nb" id="ns" onclick="setTab('snipes')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    <span>Snipes</span>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const API='https://auctionscanner.onrender.com';
let D={},SEL=null,CH=null,SN=[];
const f=n=>n==null?'---':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':Math.round(n).toLocaleString('pl');
const fn=id=>id.replace('minecraft:','').replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
const fd=ts=>{const d=new Date(ts);return d.getDate()+'.'+(d.getMonth()+1);};

async function load(){
  document.getElementById('ri').classList.add('spin');
  try{
    const [m,s]=await Promise.all([fetch(API+'/api/market-data').then(r=>r.json()),fetch(API+'/api/snipes').then(r=>r.json())]);
    D=m;SN=s;
    document.getElementById('upd').textContent=new Date().toLocaleTimeString('pl');
    renderItems();renderSnipes();countDeals();
    if(SEL&&D[SEL])selectItem(SEL);
  }catch(e){document.getElementById('upd').textContent='Błąd!';}
  document.getElementById('ri').classList.remove('spin');
}

function countDeals(){
  let c=0;
  Object.values(D).forEach(v=>{
    if(!v.history||v.history.length<2)return;
    const p=v.history.map(x=>x.price),avg=p.reduce((a,b)=>a+b)/p.length;
    if(p[p.length-1]<avg*.92)c++;
  });
  document.getElementById('sd').textContent=c;
}

function renderItems(){
  const q=document.getElementById('q').value.toLowerCase();
  const items=Object.entries(D)
    .filter(([id,v])=>v.history&&v.history.length>0)
    .filter(([id])=>!q||fn(id).toLowerCase().includes(q)||id.includes(q))
    .map(([id,v])=>{const p=v.history.map(x=>x.price),last=p[p.length-1],chg=p.length>1?(last-p[0])/p[0]*100:0;return{id,last,chg};})
    .sort((a,b)=>b.last-a.last);
  document.getElementById('il').innerHTML=items.length?items.map(({id,last,chg})=>
    `<div class="ir${SEL===id?' active':''}" onclick="selectItem('${id}')">
      <div><div class="in">${fn(id)}</div><div class="id">${id}</div></div>
      <div><div class="ip">${f(last)}</div><div class="ic ${chg>=0?'green':'red'}">${chg>=0?'+':''}${chg.toFixed(1)}%</div></div>
    </div>`).join(''):'<div class="empty">Brak przedmiotów</div>';
}

function selectItem(id){
  SEL=id;
  document.querySelectorAll('.ir').forEach(r=>r.classList.toggle('active',r.querySelector('.id')?.textContent===id));
  const v=D[id];if(!v||!v.history||!v.history.length)return;
  const h=v.history.slice(-48),p=h.map(x=>x.price);
  const avg=p.reduce((a,b)=>a+b)/p.length,last=p[p.length-1],chg=p.length>1?(last-p[0])/p[0]*100:0;
  const ratio=last/avg,rec=ratio<=.9?'BUY 🟢':ratio>=1.05?'SELL 🔴':'HOLD 🟡';
  document.getElementById('sp').textContent=f(last);
  document.getElementById('sps').textContent=`${chg>=0?'+':''}${chg.toFixed(1)}% zmiana`;
  document.getElementById('sps').className='ss '+(chg>=0?'green':'red');
  document.getElementById('sa').textContent=f(avg);
  document.getElementById('sas').textContent=`${p.length} próbek`;
  document.getElementById('ss2').textContent=f(last*64);
  document.getElementById('sr2').textContent=rec;
  const ctx=document.getElementById('chart').getContext('2d');
  if(CH)CH.destroy();
  const lc=last<avg*.95?'#22c55e':last>avg*1.05?'#ef4444':'#3a78ff';
  const g=ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,lc+'44');g.addColorStop(1,'transparent');
  CH=new Chart(ctx,{type:'line',data:{labels:h.map(x=>fd(x.timestamp)),datasets:[{data:p,borderColor:lc,backgroundColor:g,borderWidth:2,pointRadius:0,tension:.4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#475569',font:{size:9},maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.04)'}},
              y:{ticks:{color:'#475569',font:{size:9},callback:v=>f(v)},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function renderSnipes(){
  const el=document.getElementById('sl2');
  if(!SN.length){el.innerHTML='<div class="empty">Brak snipe\'ów</div>';return;}
  el.innerHTML=SN.slice(0,20).map(s=>{
    const d=((s.avg_price-s.price)/s.avg_price*100).toFixed(1);
    return`<div class="sr"><div class="sh"><span class="si">${fn(s.item_name)}</span><span class="sd">-${d}%</span></div>
      <div class="sp"><div><div class="spl">Cena</div><div class="spv green">${f(s.price)}</div></div>
      <div><div class="spl">Śred.</div><div class="spv gray">${f(s.avg_price)}</div></div>
      <div><div class="spl">Oszczędność</div><div class="spv green">${f(s.avg_price-s.price)}</div></div></div></div>`;
  }).join('');
}

function setTab(t){
  ['market','snipes'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('n'+x[0]).classList.toggle('active',x===t);
  });
}

// Service Worker dla PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

load();
setInterval(load,30000);
</script>
</body>
</html>
